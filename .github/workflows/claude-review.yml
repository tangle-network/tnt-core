name: Auto review PRs

on:
    pull_request:
        types: [opened, ready_for_review]

concurrency:
    group: claude-review-${{ github.event.pull_request.number || github.run_id }}
    cancel-in-progress: true

jobs:
    auto-review:
        if: github.event.pull_request.draft == false && contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
        permissions:
            contents: read
            id-token: write
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 1

            - name: Auto review PR
              uses: anthropics/claude-code-action@v1
              with:
                  prompt: |
                      Review this PR like an expert, critical L7 engineering lead. Optimize token usage, high signal to noise:
                      - Code quality and best practices match repo
                      - Potential bugs or issues
                      - Performance
                      - Security implications
                      - Missing documentation

                      Be constructive and specific in your feedback. Give inline comments where applicable.
                  claude_args: |
                      --allowedTools "mcp__github__add_pull_request_review_comment"
                  claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
