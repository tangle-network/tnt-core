# Publish a blueprint's released operator binary ON-CHAIN.
#
# The per-blueprint repos build + host their binary as a GitHub Release asset
# (their own release.yml — free, no secrets). This workflow is the privileged
# half: it takes a published release and records the version on Tangle via
# publishBinaryVersion. The owner key lives ONLY here (tnt-core secrets), never
# in the blueprint repos.
#
# Manual trigger — pick the blueprint repo, its release tag, and the on-chain
# blueprint id (from deployments/<network>/blueprints.tsv).
name: Publish blueprint binary (on-chain)

on:
  workflow_dispatch:
    inputs:
      blueprint_repo:
        description: 'owner/repo of the blueprint (e.g. tangle-network/llm-inference-blueprint)'
        required: true
      tag:
        description: 'Release tag in that repo (e.g. v0.1.0)'
        required: true
      blueprint_id:
        description: 'On-chain blueprint id (see blueprints.tsv)'
        required: true
      binary_name:
        description: 'Binary to publish (multi-blueprint repos, e.g. trading-instance-blueprint). Leave blank for single-binary repos.'
        required: false
        default: ''
      network:
        description: 'Deployment network (matches deployments/<network>/latest.json)'
        required: true
        default: 'base-sepolia'
      target:
        description: 'Release target triple to publish'
        required: true
        default: 'x86_64-unknown-linux-gnu'
      set_active:
        description: 'Set this version active after publishing'
        required: false
        default: 'true'
      manifest:
        description: 'Publish the multi-arch <binary>-manifest.json (binaryUri=manifest, sha256=manifest hash) instead of a single-arch tarball'
        required: false
        default: 'false'
  workflow_call:
    # Reusable entry point: a blueprint repo's release CI calls this after it
    # publishes a release, so the privileged on-chain publish stays here (the
    # owner key never leaves tnt-core). Inputs mirror workflow_dispatch; the
    # shared job below reads inputs.*/secrets.* identically for both triggers.
    inputs:
      blueprint_repo:
        type: string
        required: true
      tag:
        type: string
        required: true
      blueprint_id:
        type: string
        required: true
      binary_name:
        type: string
        required: false
        default: ''
      network:
        type: string
        required: false
        default: 'base-sepolia'
      target:
        type: string
        required: false
        default: 'x86_64-unknown-linux-gnu'
      set_active:
        type: string
        required: false
        default: 'true'
      manifest:
        type: string
        required: false
        default: 'false'
    secrets:
      PUBLISH_RPC_URL:
        required: true
      BLUEPRINT_OWNER_KEY:
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry (cast)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Resolve Tangle core address from the deployment manifest
        id: addr
        run: |
          MANIFEST="deployments/${{ inputs.network }}/latest.json"
          test -f "$MANIFEST" || { echo "::error::no manifest at $MANIFEST"; exit 1; }
          TANGLE=$(jq -er '.tangle' "$MANIFEST")
          echo "tangle=$TANGLE" >> "$GITHUB_OUTPUT"
          echo "Tangle core ($MANIFEST): $TANGLE"

      - name: Download the released binary asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO='${{ inputs.blueprint_repo }}'
          TAG='${{ inputs.tag }}'
          TRIPLE='${{ inputs.target }}'
          BIN='${{ inputs.binary_name }}'
          MANIFEST='${{ inputs.manifest }}'
          if [ "$MANIFEST" = "true" ]; then
            # Multi-arch: publish the manifest itself. binaryUri = manifest URL,
            # sha256 (computed by publish-binary.sh over BINARY_PATH) = manifest
            # hash. The manager verifies the manifest against this hash, then
            # resolves + verifies the operator's-arch asset listed inside it.
            ASSET="${BIN:+${BIN}-}manifest.json"
            ASSET="${ASSET#-}"
            gh release download "$TAG" --repo "$REPO" --pattern "$ASSET" --dir dl
            test -f "dl/$ASSET" || { echo "::error::no manifest asset $ASSET on $REPO@$TAG"; exit 1; }
            echo "BINARY_PATH=dl/$ASSET" >> "$GITHUB_ENV"
            echo "BINARY_URI=https://github.com/$REPO/releases/download/$TAG/$ASSET" >> "$GITHUB_ENV"
            echo "Manifest asset: $ASSET"
          else
            # Single-arch: release.yml names assets "<binary>-<triple>.tar.xz".
            SUFFIX="${BIN:+${BIN}-}${TRIPLE}.tar.xz"
            ASSET=$(gh release view "$TAG" --repo "$REPO" --json assets \
              --jq ".assets[] | select(.name | endswith(\"${SUFFIX}\")) | .name" | head -1)
            test -n "$ASSET" || { echo "::error::no asset for $TRIPLE on $REPO@$TAG"; exit 1; }
            gh release download "$TAG" --repo "$REPO" --pattern "$ASSET" --dir dl
            tar -xJf "dl/$ASSET" -C dl
            BINF=$(find dl -maxdepth 1 -type f ! -name '*.tar.xz' ! -name '*.json' | head -1)
            test -n "$BINF" || { echo "::error::archive had no binary"; exit 1; }
            echo "BINARY_PATH=$BINF" >> "$GITHUB_ENV"
            echo "BINARY_URI=https://github.com/$REPO/releases/download/$TAG/$ASSET" >> "$GITHUB_ENV"
            echo "Asset: $ASSET"
          fi

      - name: Publish version on-chain
        env:
          TANGLE_CORE: ${{ steps.addr.outputs.tangle }}
          RPC_URL: ${{ secrets.PUBLISH_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.BLUEPRINT_OWNER_KEY }}
          BLUEPRINT_ID: ${{ inputs.blueprint_id }}
          SET_ACTIVE: ${{ inputs.set_active }}
          # Per-release CD bumps an append-only version each release.
          ALLOW_BUMP: 'true'
        run: |
          test -n "$RPC_URL" || { echo "::error::set the PUBLISH_RPC_URL secret"; exit 1; }
          test -n "$PRIVATE_KEY" || { echo "::error::set the BLUEPRINT_OWNER_KEY secret"; exit 1; }
          bash deploy/publish-binary.sh
