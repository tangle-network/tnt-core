name: Release

on:
  push:
    tags:
      - 'v*'           # Soldeer release (e.g., v0.8.0)
      - 'bindings-v*'  # Rust bindings release (e.g., bindings-v0.8.0)
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - soldeer
          - bindings
          - both
      version:
        description: 'Version (e.g., 0.8.0)'
        required: true
        type: string

env:
  FOUNDRY_PROFILE: ci

jobs:
  # Validate before releasing
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v0.3.0

      - name: Install dependencies
        run: forge soldeer update -d

      - name: Build release artifacts
        env:
          FOUNDRY_PROFILE: local_build
        run: forge build

      - name: Test blueprint metadata storage
        env:
          FOUNDRY_PROFILE: fast
        run: forge test --match-contract BlueprintDefinitionStorageTest -vvv

  # Publish Solidity contracts to Soldeer
  publish-soldeer:
    name: Publish to Soldeer
    needs: validate
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.release_type == 'soldeer' || inputs.release_type == 'both'))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v0.3.0

      - name: Install dependencies
        run: forge soldeer update -d

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Extract version from tag (e.g., v0.8.0 -> 0.8.0)
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Publish to Soldeer
        env:
          SOLDEER_API_TOKEN: ${{ secrets.SOLDEER_API_TOKEN }}
        run: |
          if [ -z "${SOLDEER_API_TOKEN}" ]; then
            echo "::error::SOLDEER_API_TOKEN repository secret is not configured"
            exit 1
          fi
          forge soldeer push tnt-core~${{ steps.version.outputs.version }} --skip-warnings

  # Publish Rust bindings to crates.io
  publish-bindings:
    name: Publish Rust Bindings
    needs: validate
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/bindings-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.release_type == 'bindings' || inputs.release_type == 'both'))
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v0.3.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: forge soldeer update -d

      - name: Verify binding source matches release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ inputs.version }}"
          TAG="v${VERSION}"
          git fetch --depth=1 origin "refs/tags/${TAG}:refs/tags/${TAG}"
          TARGET_SHA="$(git rev-parse "${TAG}")"
          echo "TNT_CORE_VERSION_OVERRIDE=${TARGET_SHA}" >> "$GITHUB_ENV"

          if ! git diff --quiet "${TAG}" -- src foundry.toml remappings.txt soldeer.lock Cargo.toml Cargo.lock bindings/Cargo.toml bindings/README.md; then
            echo "::error::Release-relevant source differs from ${TAG}; create a new tag or publish from the tag workflow instead"
            exit 1
          fi

      - name: Generate bindings
        run: cargo xtask gen-bindings

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN repository secret is not configured"
            exit 1
          fi
          cd bindings
          cargo publish --allow-dirty
